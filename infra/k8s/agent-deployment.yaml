apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardian-stream-agent
  namespace: guardian-stream
  labels:
    app.kubernetes.io/name: guardian-stream-agent
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: guardian-stream-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guardian-stream-agent
        app.kubernetes.io/component: agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: guardian-stream/agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: guardian-stream-agent-config
            - secretRef:
                name: guardian-stream-agent-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: sec-index
              mountPath: /data/indexes
      volumes:
        - name: sec-index
          persistentVolumeClaim:
            claimName: guardian-stream-sec-index
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: guardian-stream-sec-index
  namespace: guardian-stream
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
