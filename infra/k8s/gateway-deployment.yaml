apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardian-stream-gateway
  namespace: guardian-stream
  labels:
    app.kubernetes.io/name: guardian-stream-gateway
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: guardian-stream-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guardian-stream-gateway
        app.kubernetes.io/component: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: guardian-stream/gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: guardian-stream-agent-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: PROMPT_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: guardian-stream-agent-config
                  key: PROMPT_TOPIC
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 40
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: guardian-stream-gateway
  namespace: guardian-stream
  labels:
    app.kubernetes.io/name: guardian-stream-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: guardian-stream-gateway
  ports:
    - name: http
      port: 80
      targetPort: http
