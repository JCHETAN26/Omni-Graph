server:
  port: 8080

spring:
  application:
    name: guardian-stream-gateway
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info

guardian:
  kafka:
    prompt-topic: ${PROMPT_TOPIC:sanitized-prompts}
