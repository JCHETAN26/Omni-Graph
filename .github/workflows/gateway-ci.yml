name: gateway-ci

on:
  push:
    branches: [main]
    paths:
      - "gateway/**"
      - ".github/workflows/gateway-ci.yml"
  pull_request:
    paths:
      - "gateway/**"
      - ".github/workflows/gateway-ci.yml"

jobs:
  build-and-test:
    name: Build + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Maven test
        run: mvn -B -ntp test
